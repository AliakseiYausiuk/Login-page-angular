<main>
  <section class="form-section">
    <img src="../../../assets/images/svg/logo_182x60.svg" alt="Logo icon" />
    <h2>{{ title }}</h2>
    <ng-content></ng-content>
    <div class="btn-wrapper">
      <button class="btn-primary" (click)="submit()">
        {{ primaryBtnText }}
      </button>
      <div class="divider">
        <div></div>
        <span>or</span>
        <div></div>
      </div>
      <button class="btn-secondary" (click)="navigate()">
        {{ secondaryBtnText }}
      </button>
    </div>
  </section>
  <section class="main-section">
    <h2>You Should, MoveIt!</h2>
    <img src="../../../assets/images/svg/main-illustation_597x534.svg" alt="" />
  </section>
</main>
