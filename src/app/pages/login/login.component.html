<app-default-login-layout
  title="Login into your account"
  primaryBtnText="Login Now"
  secondaryBtnText="Signup Now"
  (submit)="submit()"
  (navigate)="navigate()"
>
  <form [formGroup]="loginForm">
    <app-primary-input
      formControlName="email"
      inputName="email"
      type="email"
      label="Email"
      placeholder="johndoe@gmail.com"
    >
      <img
        src="../../../assets/images/svg/email-white_20x18.svg"
        alt="Email icon"
      />
    </app-primary-input>
    <app-primary-input
      formControlName="password"
      inputName="password"
      type="password"
      label="Your Password"
    >
      <img
        src="../../../assets/images/svg/padlock-white_18x20.svg"
        alt="Email icon"
      />
    </app-primary-input>
    <span>Forgot Password?</span>
  </form>
</app-default-login-layout>
